- name: Atmos
  descr: "Personal environmental telemetry and carbon intelligence ecosystem — tracks activity, computes CO2 emissions, and dedupes GPS/receipt data through an event-driven architecture, across a backend, web app, and mobile app."
  links:
    - label: Core
      url: https://github.com/dipu989/atmos-core
    - label: Web
      url: https://github.com/dipu989/atmos-web
    - label: Mobile
      url: https://github.com/dipu989/atmos-mobile
  tags:
    - tag: Go
    - tag: Fiber
    - tag: PostgreSQL
    - tag: GORM

