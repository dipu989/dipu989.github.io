<p class="mono-label">Log</p>
<h2>{{ site.timeline_title }}</h2>
<p style="margin-top: 0.6rem; color: var(--muted); font-size: 0.92rem;">
  For more information, have a look at my
  <a class="highlight-link" href="{{ site.cv_download_link }}" target="_blank" rel="noreferrer">curriculum vitae</a>.
</p>
<div class="log-strip">
  {% for event in site.data.timeline %}
    <div class="log-entry">
      <span class="when">{{ event.date }}</span>
      <div>
        <span class="who"><a href="{{ event.title-url }}" target="_blank" rel="noreferrer">{{ event.title }}</a></span>
        <p class="what">{{ event.subtitle }}</p>
        {% if event.tags %}
          <div class="tags">
            {% for tag in event.tags %}
              <span>{{ tag.tag }}</span>
            {% endfor %}
          </div>
        {% endif %}
      </div>
    </div>
  {% endfor %}
</div>
