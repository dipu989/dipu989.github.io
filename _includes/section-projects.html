<h2>{{ site.projects_title }}</h2>
<div class="entries">
  {% for project in site.data.projects %}
    <div class="entry">
      <h3>{{ project.name }}</h3>
      <p>{{ project.descr }}</p>
      {% if project.links %}
        <div class="links">
          {% for link in project.links %}
            <a href="{{ link.url }}" target="_blank" rel="noreferrer">{{ link.label }}</a>
          {% endfor %}
        </div>
      {% endif %}
    </div>
  {% endfor %}
</div>
